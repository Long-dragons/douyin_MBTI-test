// 进度条简单联动
window.addEventListener('scroll',()=>{
    let scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    let scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    let percent = (scrollTop/scrollHeight)*100;
    document.getElementById("progressBar").style.width = percent+"%";
});

// 计算最终MBTI
function calcMBTI(){
    let score = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    for(let i=0;i<questions.length;i++){
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if(!selected){
            alert(`还有第${i+1}题没答完哦，请凭直觉全部选完~`);
            return;
        }
        score[selected.value]++;
    }
    // 判定四个维度
    let eior = score.E >= score.I ? "E":"I";
    let snor = score.S >= score.N ? "S":"N";
    let tfor = score.T >= score.F ? "T":"F";
    let jpor = score.J >= score.P ? "J":"P";
    let finalType = eior+snor+tfor+jpor;

    // 调取详细资料
    let data = typeFullInfo[finalType];
    document.getElementById("mbtiType").innerText = finalType;
    document.getElementById("mbtiName").innerText = data.name;
    document.getElementById("mbtiDesc").innerText = data.desc;
    document.getElementById("resultBox").style.display = "block";
    // 滚动到结果
    document.getElementById("resultBox").scrollIntoView({behavior:"smooth"});
