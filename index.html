            background: linear-gradient(145deg,#fef4f8,#e8f0ff);
            padding:12px;
            max-width:100%;
            min-height:100vh;
        }
        .top-banner{
            background:linear-gradient(90deg,#ff6b9d,#845ec2);
            color:#fff;
            text-align:center;
            padding:16px;
            border-radius:16px;
            font-size:18px;
            font-weight:bold;
            margin-bottom:20px;
            box-shadow:0 4px 12px rgba(132,94,194,0.25);
        }
        h1{
            font-size:24px;
            text-align:center;
            color:#4a2e70;
            margin:10px 0;
        }
        .tip{
            text-align:center;
            color:#777;
            font-size:15px;
            margin-bottom:25px;
        }
        .q-card{
            background:#fff;
            border-radius:20px;
            padding:18px;
            margin:14px 0;
            box-shadow:0 3px 15px rgba(132,94,194,0.12);
        }
        .q-text{
            font-size:16px;
            color:#333;
            line-height:1.7;
            margin-bottom:15px;
        }
        .opt-item{
            margin:10px 0;
            padding:14px;
            border-radius:12px;
            background:#f9f4fb;
            font-size:17px;
            cursor:pointer;
            transition:0.25s;
        }
        .opt-item:active{
            background:#e8dcf5;
            transform:scale(0.98);
        }
        input[type="radio"]{
            transform:scale(1.2);
            margin-right:12px;
        }
        .submit-btn{
            width:100%;
            padding:18px;
            background:linear-gradient(90deg,#ff6b9d,#845ec2);
            color:#fff;
            border:none;
            border-radius:16px;
            font-size:20px;
            font-weight:bold;
            margin:30px 0;
            box-shadow:0 4px 15px rgba(255,107,157,0.3);
        }
        .result-box{
            background:#fff;
            border-radius:20px;
            padding:25px;
            display:none;
            margin-top:20px;
            box-shadow:0 4px 20px rgba(132,94,194,0.15);
        }
        .result-type{

            font-weight:bold;
            color:#845ec2;
            text-align:center;
            margin-bottom:10px;
        }
        .cp-title{

            color:#ff477e;
            text-align:center;
            margin:20px 0 10px;
            font-weight:bold;
        }
        .cp-text{
            background:#fff0f6;
            padding:18px;
            border-radius:14px;
            line-height:2;
            font-size:16px;
            color:#c03560;
        }
        .result-desc{
            background:#f5f0fc;
            padding:18px;
            border-radius:14px;
            line-height:2;
            margin-top:15px;
            font-size:16px;
            color:#553b75;
        }
        .progress{
            position:fixed;
            top:0;left:0;
            height:5px;
            background:linear-gradient(90deg,#ff6b9d,#845ec2);
            width:0%;
            z-index:999;
        }
    </style>

    {q:"47. 周末安排，你会？A 提前规划好要做的事(J) B 睡到自然醒，想到什么做什么(P)",k1:"J",k2:"P"},
    {q:"48. 你更欣赏？A 自律严谨、执行力强的人(J) B 随性洒脱、适应力强的人(P)",k1:"J",k2:"P"}
];
const typeInfo = {
ISTJ:{name:"严谨实干物流师",desc:"稳重靠谱、专一深情，恋爱里默默付出，给足安全感。"},

const cpMatch = {

};

//渲染题目
let html = "";
questions.forEach((item,i)=>{
html += `
<div class="q-card">
    <div class="q-text">${item.q}</div>
    <div class="opt-item">
        <input type="radio" name="q${i}" value="${item.k1}" id="a${i}">
        <label for="a${i}">选A</label>
    </div>
    <div class="opt-item">
        <input type="radio" name="q${i}" value="${item.k2}" id="b${i}">
        <label for="b${i}">选B</label>
    </div>
</div>
`;
});
document.getElementById("testContainer").innerHTML = html;

//滚动进度条
window.onscroll = () => {
    let s = document.documentElement.scrollTop || document.body.scrollTop;
    let h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    let p = (s/h)*100;
    document.getElementById("progressBar").style.width = p+"%";
};

//计算结果
function calcMBTI(){
let sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
for(let i=0;i<36;i++){
    let sel = document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){
        alert(`第${i+1}题还没选哦～凭直觉选完才能看CP缘分💗`);
        return;
    }
    sc[sel.value]++;
}
let m1=sc.E>=sc.I?"E":"I";
let m2=sc.S>=sc.N?"S":"N";
let m3=sc.T>=sc.F?"T":"F";
let m4=sc.J>=sc.P?"J":"P";
let res = m1+m2+m3+m4;

document.getElementById("mbtiType").innerText = res + " · " + typeInfo[res].name;
document.getElementById("cpInfo").innerText = cpMatch[res];
document.getElementById("mbtiDesc").innerText = typeInfo[res].desc;
document.getElementById("resultBox").style.display = "block";
document.getElementById("resultBox").scrollIntoView({behavior:"smooth"});
}
</script>
</body>
</html>
